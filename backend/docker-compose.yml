version: '3.9'

services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://hoteltv:hoteltv@postgres:5432/hoteltv"
      REDIS_URL:    "redis://redis:6379"
      JWT_SECRET:   "${JWT_SECRET}"
      EXELY_WEBHOOK_SECRET: "${EXELY_WEBHOOK_SECRET}"
      OPENWEATHER_API_KEY:  "${OPENWEATHER_API_KEY}"
      MEDIA_DIR:       "/data/uploads"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      PORT:  "3000"
      HOST:  "0.0.0.0"
      NODE_ENV: "production"
    volumes:
      - media_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hoteltv
      POSTGRES_USER:     hoteltv
      POSTGRES_PASSWORD: hoteltv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoteltv"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  media_data:
