version: '3.9'

services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://hoteltv:hoteltv@postgres:5432/hoteltv"
      REDIS_URL:    "redis://redis:6379"
      JWT_SECRET:   "${JWT_SECRET}"
      EXELY_WEBHOOK_SECRET: "${EXELY_WEBHOOK_SECRET}"
      OPENWEATHER_API_KEY:  "${OPENWEATHER_API_KEY}"
      S3_ENDPOINT:   "${S3_ENDPOINT}"
      S3_BUCKET:     "${S3_BUCKET}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      S3_REGION:     "${S3_REGION:-us-east-1}"
      PORT:  "3000"
      HOST:  "0.0.0.0"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hoteltv
      POSTGRES_USER:     hoteltv
      POSTGRES_PASSWORD: hoteltv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoteltv"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1
    volumes:
      - redis_data:/data

  # Self-hosted S3 — swap for AWS/DigitalOcean Spaces in production
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
