<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Hotel TV</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ════════════════════════════════════════
       PROVISIONING SCREEN
       First-launch only — staff enter room number
  ═════════════════════════════════════════════ -->
  <div id="screen-provisioning" class="screen">
    <div class="provision-box">
      <h1>Hotel TV Setup</h1>
      <p>Enter the room number to register this device</p>
      <input  id="room-input"   type="text" placeholder="e.g. 204" autocomplete="off" />
      <input  id="hotel-input"  type="text" placeholder="Hotel ID (from backend)" autocomplete="off"
              style="margin-bottom:24px" />
      <button id="register-btn" class="btn-primary">Register Device</button>
      <p id="provision-error" class="error-text"></p>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       ATTRACT SCREEN
       Shown when room is unoccupied
  ═════════════════════════════════════════════ -->
  <div id="screen-attract" class="screen">
    <div id="attract-bg" class="fullscreen-bg"></div>
    <div class="gradient-overlay"></div>

    <div class="top-bar">
      <div class="top-left">
        <img id="attract-logo" class="hotel-logo" src="" alt="Hotel Logo">
      </div>
      <div class="top-right">
        <div id="attract-clock" class="clock-display"></div>
        <div id="attract-date"  class="date-display"></div>
      </div>
    </div>

    <div class="attract-center" style="position:absolute;inset:0;display:flex;flex-direction:column;
         align-items:center;justify-content:center;z-index:10">
      <h1 id="attract-hotel-name" class="hotel-name"></h1>
    </div>

    <div id="attract-ticker" class="ticker-bar">
      <div id="attract-ticker-inner" class="ticker-inner"></div>
    </div>

    <div class="connection-dot" id="attract-dot"></div>
  </div>

  <!-- ════════════════════════════════════════
       WELCOME SCREEN
       Shown when a guest is checked in
  ═════════════════════════════════════════════ -->
  <div id="screen-welcome" class="screen">
    <div id="welcome-bg" class="fullscreen-bg"></div>
    <div class="gradient-overlay"></div>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-left">
        <img id="welcome-logo" class="hotel-logo" src="" alt="Hotel Logo">
      </div>
      <div class="top-right">
        <div class="weather-widget">
          <img id="weather-icon" class="weather-icon" src="" alt="">
          <span id="weather-temp" class="weather-temp"></span>
        </div>
        <div id="welcome-clock" class="clock-display"></div>
        <div id="welcome-date"  class="date-display"></div>
      </div>
    </div>

    <!-- Center: welcome text + stay info -->
    <div class="welcome-center">
      <h1 id="welcome-text" class="welcome-text"></h1>
      <div class="stay-info">
        <span id="stay-checkin"></span>
        <span class="stay-separator">→</span>
        <span id="stay-checkout"></span>
        <span id="stay-nights" class="nights-badge"></span>
      </div>
    </div>

    <!-- Services row -->
    <div class="services-container">
      <div id="services-grid" class="services-grid" role="navigation"
           aria-label="Hotel services"></div>
    </div>

    <!-- Announcement overlay (hidden by default) -->
    <div id="announcement-overlay" class="announcement-overlay hidden">
      <div class="announcement-box">
        <p id="announcement-text"></p>
      </div>
    </div>

    <div class="connection-dot" id="welcome-dot"></div>
  </div>

</div><!-- #app -->

<script src="js/api.js"></script>
<script src="js/clock.js"></script>
<script src="js/app.js"></script>
</body>
</html>
